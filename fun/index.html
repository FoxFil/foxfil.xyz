<!DOCTYPE html>
<!-- This page was mostly vibe-coded using Claude Sonnet 4.5 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fun.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .giant-title {
            text-align: center;
            font-size: 8em;
            font-weight: bold;
            color: white;
            margin-bottom: 60px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .section h2 {
            color: #333;
            font-size: 2em;
            margin-bottom: 30px;
            text-align: center;
        }

        .semester-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .semester-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .semester-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .semester-card.available {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .semester-card.unavailable {
            background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
            cursor: not-allowed;
        }

        .semester-card.unavailable:hover {
            transform: none;
            box-shadow: none;
        }

        .semester-card h3 {
            color: white;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .semester-card p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1em;
        }

        .semester-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        .footer em {
            font-style: italic;
        }

        @media (max-width: 768px) {
            .giant-title {
                font-size: 5em;
            }

            .section h2 {
                font-size: 1.5em;
            }

            .semester-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="giant-title">fun.</h1>
        
        <div class="section">
            <h2>Courses Grades Calculator</h2>
            
            <div class="semester-grid">
                <div class="semester-card available">
                    <a href="https://foxfil.xyz/fun/sem1grade">
                        <h3>Semester 1</h3>
                        <p>Calculate your S1 grades</p>
                    </a>
                </div>

                <div class="semester-card available">
                    <a href="https://foxfil.xyz/fun/sem2grade">
                        <h3>Semester 2</h3>
                        <p>Calculate your S2 grades</p>
                    </a>
                </div>

                <div class="semester-card unavailable">
                    <h3>Semester 3</h3>
                    <p>Not available yet</p>
                </div>

                <div class="semester-card unavailable">
                    <h3>Semester 4</h3>
                    <p>Not available yet</p>
                </div>

                <div class="semester-card unavailable">
                    <h3>Semester 5</h3>
                    <p>Not available yet</p>
                </div>

                <div class="semester-card unavailable">
                    <h3>Semester 6</h3>
                    <p>Not available yet</p>
                </div>
            </div>
        </div>

        <div class="footer">
            This page was mostly <em>~vibe~</em>coded using Claude Sonnet 4.5
        </div>
    </div>
</body>
</html>
